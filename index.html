<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Sanctuary</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(to bottom, #fff0f3, #ffffff);
            color: #5d4037;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }
        .container { width: 92%; max-width: 450px; text-align: center; padding: 20px; }
        h1 { color: #ec407a; font-size: 1.6rem; margin-bottom: 5px; }
        
        .card {
            background: white; padding: 25px; border-radius: 25px;
            box-shadow: 0 8px 20px rgba(236, 64, 122, 0.1);
            margin: 15px 0; min-height: 160px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-style: italic; font-size: 1.1rem; line-height: 1.6;
            border: 1px solid #f8bbd0;
        }
        .mood-title { font-size: 0.8rem; font-weight: bold; color: #f06292; margin-bottom: 10px; text-transform: uppercase; }

        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        button {
            background-color: #f06292; color: white; border: none;
            padding: 12px 5px; border-radius: 12px; font-size: 0.85rem;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        .btn-praise { background-color: #ad1457; grid-column: span 2; padding: 15px; }
        .btn-nav { background-color: #ec407a; padding: 15px; }

        textarea {
            width: 100%; height: 80px; border-radius: 15px; border: 1px solid #f8bbd0;
            padding: 12px; margin-top: 10px; box-sizing: border-box; outline: none; font-size: 1rem;
        }
        .save-btn { width: 100%; background-color: #5d4037; border:none; color:white; border-radius:15px; margin-top: 8px; padding: 15px; font-weight:bold; cursor:pointer;}
    </style>
</head>
<body onload="updateDailyVerse()">

    <div class="container">
        <h1>அமைதி தரும் வாசல்</h1>
        <p style="color: #f06292; font-size: 0.9rem;">"இன்று கர்த்தர் உன்னோடு பேசுகிறார்" ❤️</p>

        <div class="card">
            <div id="mood-label" class="mood-title">இன்றைய வசனம் (Daily Verse)</div>
            <div id="display-area">வசனம் லோட் ஆகிறது...</div>
        </div>

        <p style="font-size: 0.9rem; font-weight: bold; color: #ec407a;">உங்கள் மனநிலை என்ன?</p>
        <div class="button-grid">
            <button onclick="getMoodVerse('anxiety')">😟 கவலை</button>
            <button onclick="getMoodVerse('strength')">💪 பெலன்</button>
            <button onclick="getMoodVerse('peace')">😌 அமைதி</button>
            <button onclick="getMoodVerse('thanks')">🙌 நன்றி</button>
            
            <button class="btn-praise" onclick="showNextPraise()">100 துதி பலிகள் (வரிசையாக)</button>
            <button class="btn-nav" onclick="location.href='songs.html'">பாடல்கள் 🎵</button>
            <button class="btn-nav" onclick="location.href='prayers.html'">ஜெபங்கள் 📖</button>
            <button class="btn-praise" style="background:#ad1457; margin-top: 10px;" onclick="location.href='myprayer.html'">
    அன்பு ஜெபங்கள் (Family & Friends) 🙏
</button>
        </div>

        <div style="margin-top: 20px;">
            <textarea id="journal-input" placeholder="உங்கள் ஜெபத்தை இங்கே எழுதவும்..."></textarea>
            <button class="save-btn" onclick="savePrayerWithTime()">Save with Date & Time</button>
            
        </div>
    </div>

    <script>
        const moodData = {
            anxiety: [
                "உன் கவலைகளையெல்லாம் அவர்மேல் வைத்துவிடு, அவர் உன்னை ஆதரிப்பார். (சங்கீதம் 55:22)",
                "பயப்படாதே, நான் உன்னுடனே இருக்கிறேன்; திகையாதே, நான் உன் தேவன். (ஏசாயா 41:10)",
                "வருத்தப்பட்டு பாரஞ்சுமக்கிறவர்களே, என்னிடத்தில் வாருங்கள். (மத்தேயு 11:28)",
                "தேவன் நமக்கு அடைக்கலமும் பெலனும், ஆபத்துக்காலத்தில் துணையுமானவர். (சங்கீதம் 46:1)",
                "கர்த்தர் என் வெளிச்சமும் என் இரட்சிப்புமானவர், யாருக்குப் பயப்படுவேன்? (சங்கீதம் 27:1)",
                "உங்கள் இருதயம் கலங்காதிருப்பதாக; தேவனிடத்தில் விசுவாசமாயிருங்கள். (யோவான் 14:1)",
                "நீங்கள் ஒன்றுக்கும் கவலைப்படாமல், எல்லாவற்றையும் ஜெபத்தினால் தெரியப்படுத்துங்கள். (பிலிப்பியர் 4:6)",
                "திடன் கொள்ளுபவர்களாயிருங்கள், அவர் உங்களை ஒருபோதும் கைவிடுவதில்லை. (உபாகமம் 31:6)",
                "அவர் உங்களை விசாரிக்கிறவரானபடியால், கவலைகளை அவர்மேல் வைத்துவிடுங்கள். (1 பேதுரு 5:7)",
                "கர்த்தர் என் மேய்ப்பராயிருக்கிறார், நான் தாழ்ச்சியடையேன். (சங்கீதம் 23:1)"
            ],
            strength: [
                "உன்னை பெலப்படுத்துகிற கிறிஸ்துவினாலே எல்லாவற்றையும் செய்ய பெலன் உண்டு. (பிலிப்பியர் 4:13)",
                "கர்த்தருக்குக் காத்திருக்கிறவர்களோ புதுபெலன் அடைவார்கள். (ஏசாயா 40:31)",
                "என் கிருபை உனக்குப்போதும்; பலவீனத்திலே என் பலம் விளங்கும். (2 கொரிந்தியர் 12:9)",
                "கர்த்தர் என் பெலனும் என் கேடகமுமாயிருக்கிறார். (சங்கீதம் 28:7)",
                "சோர்ந்துபோகிறவனுக்கு அவர் பெலன் கொடுத்து, சத்துவத்தைப் பெருகப்பண்ணுகிறார். (ஏசாயா 40:29)",
                "கர்த்தருக்குப் பயப்படுதலே உங்கள் பெலன். (நெகேமியா 8:10)",
                "திடன் கொள், நான் உனக்குக் கட்டளையிடவில்லையா? திகையாதே. (யோசுவா 1:9)",
                "அவர் என் கால்களை மான்கால்களைப்போலாக்கி, உயரத்தில் என்னை நிறுத்துகிறார். (சங்கீதம் 18:33)",
                "கர்த்தர் என் பக்கத்தில் இருக்கிறார், நான் அஞ்சமாட்டேன். (சங்கீதம் 118:6)",
                "உன் தேவனாகிய கர்த்தர் உன் நடுவில் இருக்கிறார், அவர் வல்லமையுள்ளவர். (செப்பனியா 3:17)"
            ],
            peace: [
                "என்னுடைய சமாதானத்தையே உங்களுக்குக் கொடுக்கிறேன். (யோவான் 14:27)",
                "தேவ சமாதானம் உங்கள் இருதயங்களையும் சிந்தனைகளையும் காத்துக்கொள்ளும். (பிலிப்பியர் 4:7)",
                "அவர் காற்றை அமர்த்தி, கடலின் அலைகளை அமைதியாக்கினார். (சங்கீதம் 107:29)",
                "பூரண சமாதானத்துடன் உம்மைச் சார்ந்திருக்கிறவனை நீர் காத்துக்கொள்வீர். (ஏசாயா 26:3)",
                "அவர் புல்லுள்ள இடங்களில் என்னை மேய்த்து, அமர்ந்த தண்ணீர்கள் அண்டையில் நடத்துகிறார். (சங்கீதம் 23:2)",
                "கர்த்தர் தம்முடைய ஜனத்திற்குச் சமாதானம் அருளி ஆசீர்வதிப்பார். (சங்கீதம் 29:11)",
                "நீ படுக்கும்போது பயப்படமாட்டாய், உன் நித்திரை இன்பமாயிருக்கும். (நீதிமொழிகள் 3:24)",
                "சமாதானக் காரணராகிய கர்த்தர் தாமே உங்களுக்குச் சமாதானத்தைத் தருவார். (2 தெசலோனிக்கேயர் 3:16)",
                "உமது வேதத்தில் பிரியப்படுகிறவர்களுக்கு மிகுந்த சமாதானமுண்டு. (சங்கீதம் 119:165)",
                "கர்த்தர் என் நம்பிக்கையும் என் கேடகமுமானவர்."
            ],
            thanks: [
                "கர்த்தர் செய்த நன்மைகளுக்காக அவருக்கு என்னத்தைச் செலுத்துவேன்? (சங்கீதம் 116:12)",
                "எல்லாவற்றிற்காகவும் ஸ்தோத்திரம் செய்யுங்கள்; இதுவே தேவனுடைய சித்தம். (1 தெசலோனிக்கேயர் 5:18)",
                "என் ஆத்துமாவே கர்த்தரை ஸ்தோத்திரி; அவர் செய்த உபகாரங்களை மறவாதே. (சங்கீதம் 103:2)",
                "கர்த்தர் நல்லவர், அவருடைய கிருபை என்றென்றைக்கும் உள்ளது. (சங்கீதம் 100:5)",
                "துதியினாலே தேவனை மகிமைப்படுத்துவேன், அது அவருக்குப் பிரியமாயிருக்கும். (சங்கீதம் 69:30)",
                "கர்த்தருக்கு நன்றி செலுத்துங்கள், அவர் தம்முடைய செயல்களில் வல்லவர்.",
                "அவருடைய வாசல்களில் துதியுடனும், பிராகாரங்களில் ஸ்தோத்திரத்துடனும் நுழையுங்கள். (சங்கீதம் 100:4)",
                "அவர் நமக்குச் செய்த அதிசயங்களுக்காக அவருக்குப் புதிய பாட்டைப் பாடுங்கள்.",
                "நன்றிப் பலியிடுகிறவன் என்னை மகிமைப்படுத்துகிறான். (சங்கீதம் 50:23)",
                "தேவனுக்கு மகிமையும் கனமும் என்றென்றும் உண்டாவதாக. ஆமென்."
            ]
        };

        // 100 Unique Praises
        const praises = [];
        const pNames = ["அதிசயமானவரே", "வல்லமையுள்ளவரே", "இரக்கமுள்ளவரே", "கிருபையுள்ளவரே", "பரிசுத்தரே", "நீதியுள்ளவரே", "மாறாதவரே", "உண்மையுள்ளவரே", "அன்புருவானவரே", "நித்திய பிதாவே"];
        for(let i=0; i<100; i++) {
            praises.push(`${pNames[i % 10]} உமக்கு ஸ்தோத்திரம்!`);
        }

        let pIndex = 0;

        // --- 24 Hour Logic ---
        function updateDailyVerse() {
            // ஒரு வருடத்தில் இன்று எத்தனையாவது நாள் என்பதைக் கணக்கிடுதல் (Day of Year)
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);

            // அனைத்து வசனங்களையும் ஒரு பெரிய பட்டியலாக மாற்றுதல்
            const allVerses = [...moodData.anxiety, ...moodData.strength, ...moodData.peace, ...moodData.thanks];
            
            // அன்றைய நாளுக்குரிய வசனத்தைத் தேர்ந்தெடுத்தல் (365 நாட்களுக்கும் சுழலும்)
            const dailyVerse = allVerses[dayOfYear % allVerses.length];
            
            document.getElementById('display-area').innerText = dailyVerse;
            document.getElementById('mood-label').innerText = "இன்றைய வசனம் (Daily Verse)";
        }

        function getMoodVerse(m) {
            const list = moodData[m];
            document.getElementById('display-area').innerText = list[Math.floor(Math.random() * list.length)];
            const labels = {anxiety: "ஆறுதல்", strength: "பெலன்", peace: "சமாதானம்", thanks: "நன்றி"};
            document.getElementById('mood-label').innerText = labels[m];
        }

        function showNextPraise() {
            if(pIndex >= 100) pIndex = 0;
            document.getElementById('display-area').innerText = (pIndex + 1) + ". " + praises[pIndex];
            document.getElementById('mood-label').innerText = "துதி பலி";
            pIndex++;
        }

        function savePrayerWithTime() {
            const text = document.getElementById('journal-input').value;
            if(!text) return;
            const now = new Date();
            const timestamp = now.toLocaleDateString('ta-IN') + " | " + now.toLocaleTimeString('ta-IN');
            let prayers = JSON.parse(localStorage.getItem('myPrayers')) || [];
            prayers.unshift({ note: text, time: timestamp });
            localStorage.setItem('myPrayers', JSON.stringify(prayers));
            document.getElementById('journal-input').value = "";
            alert("உமது ஜெபத்திற்கு விரைவில் பதில் தருவார்");
        }
    </script>
</body>
</html>
